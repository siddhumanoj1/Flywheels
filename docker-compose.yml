services:
  postgres:
    image: postgres:16-alpine
    container_name: flywheels-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flywheels_auto
      POSTGRES_USER: flywheels
      POSTGRES_PASSWORD: flywheels
    ports:
      - "5432:5432"
    volumes:
      - flywheels-postgres-data:/var/lib/postgresql/data

volumes:
  flywheels-postgres-data:

